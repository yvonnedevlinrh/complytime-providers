// SPDX-License-Identifier: Apache-2.0
// Plugin API contract for complyctl plugin system
// Generated with buf for protobuf code generation,
// linting, and breaking change detection

syntax = "proto3";

package complyctl.plugin.v1;

option go_package = "github.com/complytime/complyctl/internal/proto/plugin/v1;pluginv1";

// Plugin service for compliance evaluation
service Plugin {
  // Generate prepares declarative policies based on
  // assessment plan configuration
  // Called during `complyctl generate` command execution
  rpc Generate(GenerateRequest) returns (GenerateResponse);

  // Scan executes compliance checks against targets
  // Called during `complyctl scan` command execution
  rpc Scan(ScanRequest) returns (ScanResponse);

  // Describe reports plugin identity, health, and declared variable
  // requirements. Called during plugin discovery and doctor diagnostics.
  rpc Describe(DescribeRequest) returns (DescribeResponse);

  // Export ships scan evidence to a Beacon collector via ProofWatch.
  // Called during `complyctl scan` when COMPLYTIME_EXPORT_ENABLED is set, after scan completes.
  // Only plugins that declare supports_export=true in DescribeResponse
  // will receive this call.
  rpc Export(ExportRequest) returns (ExportResponse);
}

// GenerateRequest contains assessment plan configuration for policy preparation.
// Uses the three-tier variable model (R48):
//   Tier 1: global_variables — workspace-level variables
//   Tier 2: target_variables — per-target variables from complytime.yaml targets[].variables
//   Tier 3: test variables — per-requirement (in AssessmentConfiguration.parameters)
message GenerateRequest {
  // Workspace-level variables from complytime.yaml `variables` section.
  // See R48: specs/001-gemara-native-workflow/research.md
  map<string, string> global_variables = 1;

  // Per-requirement test configuration
  repeated AssessmentConfiguration configurations = 2;

  // Per-target variables from complytime.yaml targets[].variables.
  // Generate is invoked per (evaluator, target) pair so each call
  // carries the variables for exactly one target.
  map<string, string> target_variables = 3;
}

// AssessmentConfiguration defines general policy
// configuration extracted from assessment plan
message AssessmentConfiguration {
  // Assessment plan ID
  string plan_id = 1;

  // Requirement ID
  string requirement_id = 2;

  // Parameters map (key-value configuration) per requirement
  map<string, string> parameters = 3;
}

// GenerateResponse confirms policy preparation completion
message GenerateResponse {
  // Success indicator
  bool success = 1;

  // Error message if preparation failed
  string error_message = 2;
}

// ScanRequest contains targets to evaluate.
// The scanning provider evaluates all requirements from Generate-time state.
// See R47: specs/001-gemara-native-workflow/research.md
message ScanRequest {
  // Targets to scan
  repeated Target targets = 1;
}

// Target represents a system/environment to scan
message Target {
  // Target identifier
  string target_id = 1;

  // Plugin-defined variables (authentication tokens, connection strings, etc.)
  map<string, string> variables = 2;
}

// ScanResponse contains assessment results for each requirement.
// Providers MUST separate operational errors from evaluation results:
//   - errors: pre-scan or infrastructure failures (missing tools, clone
//     failures, config issues) where compliance posture is UNKNOWN
//   - assessments: actual policy evaluation results where compliance
//     posture is KNOWN (passed, failed, or evaluation error)
message ScanResponse {
  // Assessment log entries (one per requirement evaluated)
  repeated AssessmentLog assessments = 1;

  // Operational errors that prevented evaluation of one or more targets.
  // These represent coverage gaps, not policy violations. Providers
  // SHOULD continue scanning remaining targets and report partial
  // results in assessments alongside errors for failed targets.
  repeated string errors = 2;
}

// AssessmentLog contains results for a single requirement evaluation
message AssessmentLog {
  // Requirement ID that was evaluated
  string requirement_id = 1;

  // Steps executed during evaluation
  repeated Step steps = 2;

  // Overall result message
  string message = 3;

  // Confidence in assessment result (mirrors go-gemara ConfidenceLevel)
  ConfidenceLevel confidence = 4;
}

// Step represents a single step in the assessment process
message Step {
  // Step name/identifier
  string name = 1;

  // Step result
  Result result = 2;

  // Step result message
  string message = 3;
}

// ConfidenceLevel indicates the evaluator's confidence in an assessment result.
// Mirrors go-gemara ConfidenceLevel enum (1:1 mapping, no lossy conversion).
enum ConfidenceLevel {
  CONFIDENCE_LEVEL_NOT_SET = 0;
  CONFIDENCE_LEVEL_UNDETERMINED = 1;
  CONFIDENCE_LEVEL_LOW = 2;
  CONFIDENCE_LEVEL_MEDIUM = 3;
  CONFIDENCE_LEVEL_HIGH = 4;
}

// Result represents the outcome of a check
enum Result {
  RESULT_UNSPECIFIED = 0;
  RESULT_PASSED = 1;
  RESULT_FAILED = 2;
  RESULT_SKIPPED = 3;
  RESULT_ERROR = 4;
}

// DescribeRequest is sent to discover plugin identity and requirements.
message DescribeRequest {
  // Empty - no parameters needed
}

// DescribeResponse reports plugin identity, health, and declared variable
// requirements used by doctor diagnostics.
message DescribeResponse {
  // Health status
  bool healthy = 1;

  // Plugin version (optional)
  string version = 2;

  // Error message if unhealthy
  string error_message = 3;

  // Required global variable names — doctor validates these
  // keys exist in config.variables (R51)
  repeated string required_global_variables = 4;

  // Required target variable names — doctor validates these
  // keys exist in relevant config.targets[].variables (R51)
  repeated string required_target_variables = 5;

  // Whether this plugin implements the Export RPC for shipping
  // evidence to a Beacon collector. Defaults to false.
  bool supports_export = 6;
}

// ExportRequest carries collector configuration for evidence export.
message ExportRequest {
  CollectorConfig collector = 1;
}

// CollectorConfig holds the Beacon collector endpoint and auth credentials.
message CollectorConfig {
  // Collector OTLP endpoint (e.g. "collector.example.com:4317")
  string endpoint = 1;

  // Resolved bearer token — complyctl handles OIDC exchange, plugins
  // receive a ready-to-use token. Empty if no auth is configured.
  string auth_token = 2;
}

// ExportResponse reports the outcome of evidence export.
message ExportResponse {
  bool success = 1;
  int32 exported_count = 2;
  int32 failed_count = 3;
  string error_message = 4;
}
