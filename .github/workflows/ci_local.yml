# CI workflow for complytime-providers.
# Builds all provider binaries and runs unit tests.

name: ci

on:
    push:
        branches:
            - main
    pull_request:

permissions:
    contents: read

jobs:
    build-and-test:
        name: Build and test
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  persist-credentials: false

            - name: Set up Go
              uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
              with:
                  go-version-file: './go.mod'
                  cache: false

            - name: Build providers
              run: make build

            - name: Run unit tests
              run: make test

