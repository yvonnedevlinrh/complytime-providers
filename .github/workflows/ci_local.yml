# CI workflow for complytime-providers.
# Builds all provider binaries and runs unit tests.

name: ci

on:
    push:
        branches:
            - main
    pull_request:

permissions:
    contents: read

jobs:
    build-and-test:
        name: Build and test
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

            - name: Set up Go
              uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
              with:
                  go-version-file: './go.mod'

            - name: Build providers
              run: make build

            - name: Run unit tests
              run: make test

