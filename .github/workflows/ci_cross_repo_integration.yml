# Cross-repo integration test for complytime-providers.
# Builds the ampel provider from the current PR/push, checks out
# complyctl@main, and runs the cross-repo integration test script
# to verify provider compatibility with the latest complyctl.

name: Cross-repo integration

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize

permissions:
  contents: read

jobs:
  cross-repo-integration:
    name: Cross-repo integration test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout complytime-providers
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: './go.mod'

      - name: Build providers
        run: make build

      - name: Checkout complyctl
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: complytime/complyctl
          path: _complyctl

      - name: Build complyctl
        run: make build
        working-directory: _complyctl

      - name: Install snappy
        uses: carabiner-dev/actions/install/snappy@e0e3b8149dafed833431095bc148d50e7eade4e8 # v1.2.0

      - name: Install ampel
        uses: carabiner-dev/actions/install/ampel@e0e3b8149dafed833431095bc148d50e7eade4e8 # v1.2.0

      - name: Run cross-repo integration tests
        run: _complyctl/tests/cross-repo/cross_repo_integration_test.sh
        env:
          PROVIDERS_BIN_DIR: ${{ github.workspace }}/bin
          COMPLYCTL_BIN_DIR: ${{ github.workspace }}/_complyctl/bin
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
