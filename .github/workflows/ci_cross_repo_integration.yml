# Cross-repo integration test workflow.
# Builds the Ampel provider from the current PR/push, checks out
# complyctl@main, and runs the cross-repo integration test script
# to validate the full Ampel provider + complyctl pipeline end-to-end.
name: Cross-Repo Integration Test

on:
    push:
        branches:
            - main
    pull_request:

permissions:
    contents: read

jobs:
    cross-repo-integration:
        name: Cross-Repo Integration Test
        runs-on: ubuntu-latest

        steps:
            - name: Checkout complytime-providers
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false

            # Intentionally tracks main for HEAD-to-HEAD cross-repo integration.
            # This is a same-org repo under the same maintainer trust boundary.
            - name: Checkout complyctl
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  repository: complytime/complyctl
                  ref: main
                  path: _complyctl
                  persist-credentials: false

            # Use the higher Go version from the two repos so both can build
            # regardless of which side bumps first.
            - name: Determine Go version
              id: go-version
              run: |
                  v1=$(awk '/^go / {print $2}' go.mod)
                  v2=$(awk '/^go / {print $2}' _complyctl/go.mod)
                  max=$(printf '%s\n%s\n' "$v1" "$v2" | sort -V | tail -1)
                  echo "version=$max" >> "$GITHUB_OUTPUT"

            - name: Set up Go
              uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
              with:
                  go-version: ${{ steps.go-version.outputs.version }}

            - name: Build providers
              run: make build

            - name: Build complyctl
              run: make build
              working-directory: _complyctl

            - name: Install snappy
              uses: carabiner-dev/actions/install/snappy@e0e3b8149dafed833431095bc148d50e7eade4e8 # v1.2.0

            - name: Install ampel
              uses: carabiner-dev/actions/install/ampel@e0e3b8149dafed833431095bc148d50e7eade4e8 # v1.2.0

            - name: Run cross-repo integration test
              env:
                  PROVIDERS_BIN_DIR: ${{ github.workspace }}/bin
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: make test-cross-repo COMPLYCTL_DIR=_complyctl
