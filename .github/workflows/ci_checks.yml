name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  issues: none
  pull-requests: none

jobs:
  call_reusable_ci:
    name: Standardized CI
    uses: complytime/org-infra/.github/workflows/reusable_ci.yml@bbd7194995388f96dd28c0c0792d406c8a249140 # v0.4.0
    permissions:
      contents: read
      issues: read
      pull-requests: read
