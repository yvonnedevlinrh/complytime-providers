name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  issues: none
  pull-requests: none

jobs:
  call_reusable_ci:
    name: Standardized CI
    uses: complytime/org-infra/.github/workflows/reusable_ci.yml@15476efc3c2837fa9564943a1f8714cd71ddc288 # v0.3.0
    permissions:
      contents: read
      issues: read
