name: Security Checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  actions: none
  id-token: none
  security-events: none
  packages: none

jobs:
  call_reusable_vuln_scan:
    name: OSV-Scanner
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: complytime/org-infra/.github/workflows/reusable_vuln_scan.yml@2c193416adbc621a64021ace52bf57114d703888 # v0.3.1
    with:
      # OSV focuses on known CVEs in dependencies; Trivy adds broader coverage
      enable_trivy_source: true

  call_reusable_security:
    name: OpenSSF Scorecards
    permissions:
      contents: read
      id-token: write
      security-events: write
    uses: complytime/org-infra/.github/workflows/reusable_security.yml@15476efc3c2837fa9564943a1f8714cd71ddc288 # v0.3.0
